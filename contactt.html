<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Travel contact</title>

<style>
* {
    margin:none;
    padding:none;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}
header {
    background: black;
    padding: 15px 50px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.container {
    width: 90%;
    margin-top:-10px;

}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color:white;
    font-size:15px;
}

.logo {
    color: #f4a825;
    
}

nav a {
    margin-left:20px;
    text-decoration: none;
    color: white;
    font-size:20px;
}

nav a.active {
    color: #f4a825;
    font-weight: bold;
}


.contact {
    padding: 60px 0;
    background: #f9f9f9;
    text-align: center;
}

.contact h1 {
    font-size: 36px;
    margin-bottom: 10px;
    margin-top:-20px;
    text-align:center;
}

.subtitle {
    color: blue;
    margin-bottom: 40px;
}
.contact-wrapper {
    display: flex;
    gap: 40px;
    justify-content: center;
    align-items: flex-start;
}
.contact-form {
    background: #fff;
    padding: 25px;
    width: 50%;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.contact-form input,
.contact-form textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid black;
    border-radius: 5px;
}

.contact-form button {
    background: #f4a825;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
}
.contact-form button:hover{
    border:2px solid black;
}
.contact-info {
    width: 30%;
    text-align: left;
}

.contact-info h3 {
    margin-bottom: 15px;
    color:green;
}

.contact-info p {
    margin-bottom: 10px;
    color: black;
}

.socials a {
    display: block;
    margin-top: 8px;
    text-decoration: none;
    color: #f4a825;
}

@media (max-width: 768px) {
    .contact-wrapper {
        flex-direction: column;
    }

    .contact-form,
    .contact-info {
        width: 100%;
    }
}
</style>

</head>
<body>
<header>
    <div class="container nav">
        <h2 class="logo">GO</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="blogg.html">Blog</a>
            <a href="aboutt.html">About</a>
            <a href="servicess.html">Services</a>
            <a href="contactt.html">Contact</a>
            
        </nav>
    </div>
</header>

<section class="contact">
    <div class="container">
        <h1>Contact Us</h1>
        <p class="subtitle">We’d love to hear from you</p>

        <div class="contact-wrapper">
            <form class="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject">
                <textarea placeholder="Your Message" rows="6"></textarea>
                <button type="submit">Send Message</button>
            </form>
            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p><strong>Address:</strong> Bangalore, India</p>
                <p><strong>Email:</strong> travel@email.com</p>
                <p><strong>Phone:</strong> +91 68765 49990</p>

                <div class="socials">
                    <a href="#">Facebook</a>
                    <a href="#">Instagram</a>
                    <a href="#">Twitter</a>
                </div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
